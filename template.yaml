AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Resources:
  ProcessamentoDadosTCC:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: processamentodadostcc
      Handler: lambda_function.lambda_handler
      Runtime: python3.13
      MemorySize: 128
      Timeout: 30
      Role: arn:aws:iam::797225460896:role/lambda-execution-role
      Events:
        DailyTrigger:
          Type: Schedule
          Properties:
            Schedule: cron(0 9 * * ? *)   # 09:00 UTC = 06:00 BRT
